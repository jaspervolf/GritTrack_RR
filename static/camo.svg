<svg xmlns="http://www.w3.org/2000/svg" width="300" height="38" viewBox="0 0 300 38">

  <!-- Base: very dark forest floor -->
  <rect width="300" height="38" fill="#161810"/>

  <!-- Large background organic blobs — dark olive -->
  <path d="M0,0 C15,5 28,2 42,10 C56,18 52,32 36,36 C20,40 4,32 0,22 Z" fill="#1e2814"/>
  <path d="M58,0 C76,0 96,6 106,16 C116,26 112,38 92,38 C72,38 60,28 58,18 Z" fill="#232e18"/>
  <path d="M148,2 C163,0 180,8 186,18 C192,28 184,38 168,38 C152,38 142,28 142,18 C142,8 146,2 148,2 Z" fill="#1e2814"/>
  <path d="M218,2 C234,0 256,4 266,14 C276,24 272,38 255,38 C238,38 228,28 222,18 C218,10 216,4 218,2 Z" fill="#252c18"/>
  <path d="M272,0 C287,4 300,2 300,12 L300,38 C286,38 274,30 270,20 Z" fill="#1e2414"/>

  <!-- Bark and wood texture blobs — gray-brown -->
  <path d="M8,20 C18,14 36,18 40,28 C44,36 33,40 22,38 C12,36 5,28 8,20 Z" fill="#3a3228" opacity="0.85"/>
  <path d="M84,4 C96,2 110,8 112,16 C114,24 106,30 95,28 C83,26 78,16 84,4 Z" fill="#44382e" opacity="0.75"/>
  <path d="M194,22 C206,18 220,22 222,32 C224,38 216,40 205,38 C194,36 188,28 194,22 Z" fill="#3e3428" opacity="0.85"/>
  <path d="M270,14 C280,10 295,14 298,24 C300,32 292,38 282,36 C272,34 266,26 270,14 Z" fill="#443a2e" opacity="0.7"/>

  <!-- Tan dead leaf organic shapes -->
  <path d="M48,0 C62,4 70,14 66,24 C62,32 54,34 46,28 C40,24 38,14 44,6 Z" fill="#7a6430" opacity="0.9"/>
  <path d="M128,8 C140,4 152,10 154,20 C156,28 148,34 138,30 C128,26 124,18 128,8 Z" fill="#8a7238" opacity="0.88"/>
  <path d="M238,0 C252,4 260,12 257,22 C254,30 245,32 236,28 C228,22 226,12 232,4 Z" fill="#7e6a32" opacity="0.9"/>

  <!-- Green leaf shapes -->
  <path d="M14,4 C22,0 32,4 30,14 C28,22 18,24 12,18 C6,14 7,8 14,4 Z" fill="#3a5820" opacity="0.88"/>
  <path d="M112,20 C120,16 132,20 130,30 C128,38 118,38 110,32 C104,28 106,24 112,20 Z" fill="#405e24" opacity="0.82"/>
  <path d="M174,0 C183,4 188,12 184,20 C180,26 172,26 166,20 C160,14 162,6 168,2 Z" fill="#3c5820" opacity="0.88"/>
  <path d="M284,8 C293,4 302,10 300,20 C298,30 290,32 283,26 C276,22 278,12 284,8 Z" fill="#446228" opacity="0.82"/>

  <!-- Main branch — sweeps across full width -->
  <path d="M0,32 C25,22 55,12 88,10 C121,8 142,16 162,24" stroke="#26200e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M158,24 C180,30 208,34 238,26 C262,18 282,8 300,12" stroke="#30281a" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Secondary branches / twigs -->
  <path d="M38,10 C44,18 46,28 44,36" stroke="#2a2010" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M88,10 C92,20 94,30 90,38" stroke="#322814" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M162,24 C168,16 172,6 168,0" stroke="#2a2010" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M200,26 C210,18 216,8 212,0" stroke="#2e2412" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M260,22 C266,14 268,4 264,0" stroke="#2a2010" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Small leaf accent ellipses -->
  <ellipse cx="26" cy="6" rx="7" ry="3.5" fill="#6e5c26" transform="rotate(30 26 6)" opacity="0.9"/>
  <ellipse cx="72" cy="30" rx="6" ry="3" fill="#507030" transform="rotate(-22 72 30)" opacity="0.85"/>
  <ellipse cx="142" cy="5" rx="8" ry="3.5" fill="#7a6a2e" transform="rotate(18 142 5)" opacity="0.9"/>
  <ellipse cx="208" cy="12" rx="6" ry="3" fill="#3a5c1e" transform="rotate(-35 208 12)" opacity="0.85"/>
  <ellipse cx="252" cy="34" rx="7" ry="3.5" fill="#6a5c28" transform="rotate(28 252 34)" opacity="0.88"/>

  <!-- Light bark highlight patches for depth -->
  <ellipse cx="34" cy="24" rx="5" ry="2.5" fill="#7a6e58" transform="rotate(12 34 24)" opacity="0.45"/>
  <ellipse cx="168" cy="16" rx="6" ry="2.5" fill="#726050" transform="rotate(-16 168 16)" opacity="0.4"/>
  <ellipse cx="246" cy="10" rx="5" ry="2.5" fill="#7a6e56" transform="rotate(22 246 10)" opacity="0.45"/>

  <!-- Copper overlay tint to tie into app palette -->
  <rect width="300" height="38" fill="rgba(180,80,20,0.04)"/>
</svg>
